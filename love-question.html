<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jcmd你愿意跟俺好一辈子吗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffe4e9;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 15px;
            overflow: hidden;
        }

        .float-kitty {
            position: fixed;
            opacity: 0;
            pointer-events: none;
            animation: floatKitty 2.5s ease-in-out infinite;
        }

        .float-kitty.hidden {
            animation: none;
            opacity: 0;
        }

        .float-kitty img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        @keyframes floatKitty {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.9;
            }
            95% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .float-cry {
            position: fixed;
            opacity: 1;
            pointer-events: none;
            font-size: 40px;
            animation: floatCry 1.5s ease-out infinite;
        }

        .float-text {
            position: fixed;
            opacity: 0.9;
            pointer-events: none;
            font-size: 18px;
            color: #ff6b9d;
            font-weight: 500;
            white-space: nowrap;
            animation: floatText 2s ease-out infinite;
        }

        @keyframes floatCry {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        @keyframes floatText {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-120vh) translateX(50px);
                opacity: 0;
            }
        }

        .dancer {
            position: fixed;
            font-size: 60px;
            animation: bounce 0.5s ease-in-out infinite;
            display: none;
            z-index: 100;
        }

        .dancer.show {
            display: block;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        .container {
            text-align: center;
            background: white;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: normal;
        }

        .buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            font-size: 17px;
            font-weight: 500;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 110px;
        }

        .btn-yes {
            background: #ff6b9d;
            color: white;
        }

        .btn-yes:hover {
            background: #e85a8a;
            transform: translateY(-2px);
        }

        .btn-no {
            background: #667eea;
            color: white;
            position: relative;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px 25px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
            max-width: 340px;
        }

        .modal-content h2 {
            font-size: 19px;
            color: #ff6b9d;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .modal-content p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .gift-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 1px solid #ffe4e9;
            border-radius: 8px;
            outline: none;
            background: #fff;
            color: #333;
        }

        .gift-input:focus {
            border-color: #ff6b9d;
        }

        .btn-submit {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff6b9d;
            color: white;
        }

        .btn-submit:hover {
            background: #e85a8a;
        }

        @media (max-width: 380px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 18px;
            }

            .buttons {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
            }

            .float-kitty img {
                width: 40px;
                height: 40px;
            }

            .float-cry {
                font-size: 30px;
            }

            .float-text {
                font-size: 14px;
            }

            .dancer {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="dancer" id="dancer">🎉</div>
    
    <div class="container">
        <h1>jcmd你愿意跟俺好一辈子吗</h1>
        
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn">当然愿意</button>
            <button class="btn btn-no" id="noBtn">no</button>
        </div>
    </div>

    <div class="modal-overlay" id="giftModal">
        <div class="modal-content">
            <h2>太好了！</h2>
            <p>你希望收到什么礼物呢？</p>
            <input type="text" class="gift-input" id="giftInput" placeholder="请输入你想要的礼物">
            <button class="btn-submit" id="submitBtn">提交愿望</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const giftModal = document.getElementById('giftModal');
        const giftInput = document.getElementById('giftInput');
        const submitBtn = document.getElementById('submitBtn');
        const dancer = document.getElementById('dancer');

        let kitties = [];
        let cries = [];
        let texts = [];
        let isNoClicked = false;

        const kittySrc = 'kitty.png.jpg';

        function createKitties() {
            for (let i = 0; i < 8; i++) {
                const kitty = document.createElement('div');
                kitty.className = 'float-kitty';
                kitty.innerHTML = `<img src="${kittySrc}" alt="Kitty">`;
                kitty.style.left = Math.random() * 100 + '%';
                kitty.style.animationDelay = Math.random() * 2 + 's';
                kitty.style.animationDuration = (2 + Math.random() * 1.5) + 's';
                document.body.appendChild(kitty);
                kitties.push(kitty);
            }
        }

        function stopKitties() {
            kitties.forEach(kitty => {
                kitty.classList.add('hidden');
            });
        }

        function createCries() {
            const cryEmojis = ['😢', '😭', '🥺', '😿', '😰'];
            for (let i = 0; i < 8; i++) {
                const cry = document.createElement('div');
                cry.className = 'float-cry';
                cry.textContent = cryEmojis[Math.floor(Math.random() * cryEmojis.length)];
                cry.style.left = Math.random() * 100 + '%';
                cry.style.top = '100%';
                cry.style.animationDuration = (1 + Math.random() * 0.5) + 's';
                document.body.appendChild(cry);
                cries.push(cry);
            }
        }

        function createTexts() {
            for (let i = 0; i < 5; i++) {
                const text = document.createElement('div');
                text.className = 'float-text';
                text.textContent = '多姐请你三思';
                text.style.left = Math.random() * 100 + '%';
                text.style.top = '100%';
                text.style.animationDuration = (1.2 + Math.random() * 0.6) + 's';
                document.body.appendChild(text);
                texts.push(text);
            }
        }

        function showDancer() {
            dancer.style.left = '50%';
            dancer.style.top = '30%';
            dancer.style.transform = 'translate(-50%, -50%)';
            dancer.classList.add('show');
            
            setTimeout(() => {
                dancer.classList.remove('show');
                giftModal.classList.add('show');
            }, 2000);
        }

        noBtn.addEventListener('mouseenter', function() {
            const maxX = 150;
            const maxY = 80;
            const randomX = (Math.random() - 0.5) * maxX;
            const randomY = (Math.random() - 0.5) * maxY;
            
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
            
            stopKitties();
            kitties = [];
            
            createCries();
            createTexts();
        });

        noBtn.addEventListener('mouseleave', function() {
            noBtn.style.transform = 'translate(0, 0)';
            
            cries.forEach(cry => {
                document.body.removeChild(cry);
            });
            cries = [];
            
            texts.forEach(text => {
                document.body.removeChild(text);
            });
            texts = [];
            
            createKitties();
        });

        yesBtn.addEventListener('click', function() {
            showDancer();
        });

        submitBtn.addEventListener('click', function() {
            const wish = giftInput.value.trim();
            if (wish) {
                localStorage.setItem('loveWish', wish);
                window.location.href = 'ex-gift.html';
            }
        });

        giftModal.addEventListener('click', function(e) {
            if (e.target === giftModal) {
                giftModal.classList.remove('show');
            }
        });

        giftInput.addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });

        createKitties();
    </script>
</body>
</html>
