<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffe4e9;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .float-kitty {
            position: fixed;
            opacity: 0;
            pointer-events: none;
            animation: floatKitty 2.5s ease-in-out infinite;
        }

        .float-kitty img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        @keyframes floatKitty {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.9;
            }
            95% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-size: 22px;
            color: #ff6b9d;
            margin-bottom: 20px;
            font-weight: normal;
        }

        p {
            font-size: 15px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .wish-text {
            font-size: 16px;
            color: #333;
            font-weight: 500;
            margin-top: 20px;
            padding: 15px;
            background: #fff5f7;
            border-radius: 8px;
        }

        @media (max-width: 380px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 20px;
            }

            .float-kitty img {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我已经收到</h1>
        <p>请你静候</p>
        <div class="wish-text" id="wishDisplay"></div>
    </div>

    <script>
        const wishDisplay = document.getElementById('wishDisplay');
        const savedWish = localStorage.getItem('loveWish');
        
        if (savedWish) {
            wishDisplay.textContent = savedWish;
        } else {
            wishDisplay.textContent = '暂无愿望';
        }

        const kittySrc = 'kitty.png.jpg';

        for (let i = 0; i < 8; i++) {
            const kitty = document.createElement('div');
            kitty.className = 'float-kitty';
            kitty.innerHTML = `<img src="${kittySrc}" alt="Kitty">`;
            kitty.style.left = Math.random() * 100 + '%';
            kitty.style.animationDelay = Math.random() * 2 + 's';
            kitty.style.animationDuration = (2 + Math.random() * 1.5) + 's';
            document.body.appendChild(kitty);
        }
    </script>
</body>
</html>
